name: 🐞 Báo lỗi | Bug report
description: Báo lỗi ứng dụng | Bug report
labels: [Bug]
body:

  - type: input
    id: telecloud-version
    attributes:
      label: Phiên bản TeleCloud | Which version of TeleCloud are you using
      placeholder: |
        Ví dụ: "v3.1.1"
        Example: "v3.1.1"
    validations:
      required: true

  - type: input
    id: telecloud-os
    attributes:
      label: Hệ điều hành | Which OS is running TeleCloud
      placeholder: |
        Ví dụ: "Linux"
        Example: "Termux"
    validations:
      required: true

  - type: textarea
    id: telecloud-env
    attributes:
      label: Cấu hình môi trường | Environment Configuration (.env)
      placeholder: |
        Example:
        LOG_GROUP_ID=me
        PORT=8091
        #TG_UPLOAD_THREADS=2
        #DATABASE_PATH=database.db
        #THUMBS_DIR=static/thumbs
        #TEMP_DIR=./temp
        #PROXY_URL= # e.g. socks5://127.0.0.1:1080 or http://127.0.0.1:8080
        FFMPEG_PATH=ffmpeg
        #YTDLP_PATH=yt-dlp
    validations:
      required: true

  - type: textarea
    id: reproduce-steps
    attributes:
      label: Mô tả chi tiết cách tái hiện lại lỗi | Provide an example of the issue
    validations:
      required: true
